# Push sonrası lint, typecheck ve build çalıştırır.
# Main'e push etmeden önce hata yakalamanı sağlar (beceri geliştirmek için iyi pratik).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          AUTH_SECRET: ci-placeholder-secret
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
